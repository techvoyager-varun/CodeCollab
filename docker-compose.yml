version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - codecollab_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost/api
      - NEXT_PUBLIC_SOCKET_URL=http://localhost
    depends_on:
      - backend
    networks:
      - codecollab_network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - PORT=5000
      - DATABASE_URL=postgresql://codecollab:codecollab_secret@postgres:5432/codecollab
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=codecollab_jwt_secret_change_in_production
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - NODE_ENV=production
      - FRONTEND_URL=http://localhost
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - codecollab_network
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_USER=codecollab
      - POSTGRES_PASSWORD=codecollab_secret
      - POSTGRES_DB=codecollab
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codecollab"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - codecollab_network
    restart: unless-stopped

  redis:
    image: redis:alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - codecollab_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  codecollab_network:
    driver: bridge
